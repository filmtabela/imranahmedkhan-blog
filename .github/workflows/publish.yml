name: Batch Publish - IAK
on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST — queue batch
    - cron: '30 14 * * *'  # 8:00 PM IST — retrieve & publish
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Generate and publish article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node publish.js
      - name: Commit new article to GitHub
        run: |
          git config user.name "IAK Publisher Bot"
          git config user.email "filmtabela@gmail.com"
          git add .
          git diff --staged --quiet || git commit -m "Batch publish: $(date +'%Y-%m-%d %H:%M IST')"
          git push
